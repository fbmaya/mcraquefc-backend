name: Deploy backend

on:
  push:
    branches: [master]
  workflow_dispatch:

# Valores definidos em Settings > Secrets and variables > Actions > Variables (repo).
env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  SERVICE: ${{ vars.GCP_SERVICE }}
  AR_REPO: ${{ vars.GCP_AR_REPO }}
  WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  DEPLOYER_SA: ${{ vars.GCP_DEPLOYER_SA }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # necessário para o WIF
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="$AR_REPO/$SERVICE"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to Cloud Run
        # Só a imagem muda; SA, VPC, secrets e porta são preservados da revisão atual.
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$AR_REPO/$SERVICE:${{ github.sha }}" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --quiet
